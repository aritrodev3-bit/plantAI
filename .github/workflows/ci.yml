name: VerdantAI CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check backend imports
        run: |
          cd backend
          python -c "from remedy_generator import get_remedy; print('remedy_generator OK')"
          python -c "from gradcam import GradCAM, apply_heatmap; print('gradcam OK')"

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 backend/ frontend/ --max-line-length=120 --ignore=E501,W503,E241,E261,W292,E302,E402,E303,F401,E221